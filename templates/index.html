<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio AutoU - Classificador de Emails</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="container">
        <header>
            <h1>🚀 Classificador de Emails com IA</h1>
            <p>Cole um texto de email ou faça upload de um arquivo (.txt ou .pdf) para classificar seu conteúdo e sugerir uma resposta.</p>
        </header>

        <section class="form-container">
            <div class="input-area">
                <textarea id="email-text" rows="10" placeholder="Cole o texto do email aqui..."></textarea>
            </div>
            
            <div class="upload-area">
                <label for="file-upload" class="file-label">
                    <span>Ou arraste e solte um arquivo (.txt, .pdf)</span>
                    <input type="file" id="file-upload" accept=".txt,.pdf">
                </label>
                <span id="file-name">Nenhum arquivo selecionado</span>
            </div>

            <button id="process-button">Processar Email</button>
        </section>

        <section id="result-section" class="hidden">
            <h2>Resultado da Análise</h2>
            <div id="result-content">
                <div class="result-box">
                    <h3>Classificação</h3>
                    <p id="classification-result"></p>
                </div>
                <div class="result-box">
                    <h3>Resposta Sugerida</h3>
                    <p id="suggestion-result"></p>
                </div>
            </div>
            <div id="error-message" class="hidden"></div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
